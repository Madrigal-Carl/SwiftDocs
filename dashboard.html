      // Icon component using Lucide
      const Icon = ({ name, size = 20, className = "" }) => {
        const iconRef = useRef(null);

        useEffect(() => {
          if (iconRef.current && window.lucide) {
            iconRef.current.innerHTML = "";
            const iconElement = document.createElement("i");
            iconElement.setAttribute("data-lucide", name);
            iconElement.setAttribute("width", size);
            iconElement.setAttribute("height", size);
            iconRef.current.appendChild(iconElement);
            lucide.createIcons();
          }
        }, [name, size]);

        return <span ref={iconRef} className={className} />;
      };

                      <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-[var(--primary-600)]">
                        {request.code}
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-[var(--text-dark)]">
                        {request.student}
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                        {request.document}
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                        {request.date}
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap">
                        <StatusBadge status={request.status} />
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      // Main App Component
      const App = () => {
        return (
          <div className="flex h-screen bg-[var(--bg-light)] overflow-hidden">
            <Sidebar />

            <div className="flex-1 flex flex-col ml-64 overflow-hidden">
              <Header />

              <main className="flex-1 overflow-y-auto p-6">
                <div className="max-w-7xl mx-auto space-y-6">
                  <WelcomeBanner />

                  {/* Statistics Grid */}
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <StatCard
                      title="Total Requests"
                      value="10"
                      trend="12%"
                      trendUp={true}
                      icon={Icons.File}
                      colorClass="blue"
                    />
                    <StatCard
                      title="Pending Requests"
                      value="4"
                      trend="3"
                      trendUp={true}
                      icon={Icons.Clock}
                      colorClass="yellow"
                    />
                    <StatCard
                      title="Approved Requests"
                      value="4"
                      trend="8%"
                      trendUp={true}
                      icon={Icons.CheckCircle}
                      colorClass="green"
                    />
                    <StatCard
                      title="Completed Requests"
                      value="1"
                      trend="2%"
                      trendUp={false}
                      icon={Icons.BadgeCheck}
                      colorClass="purple"
                    />
                  </div>

                  <RecentRequests />
                </div>
              </main>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
